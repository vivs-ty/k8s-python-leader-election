name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DockerHub
      if: >-
        env.DOCKERHUB_USERNAME != '' &&
        (github.event_name == 'push' ||
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name == github.repository))
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Compute image tags
      id: tags
      run: |
        if [[ "${{ github.event_name }}" == "push" ]] && [[ -n "$DOCKERHUB_USERNAME" ]]; then
          echo "tags=${DOCKERHUB_USERNAME}/k8s-python-leader-election:latest,${DOCKERHUB_USERNAME}/k8s-python-leader-election:${{ github.sha }}" >> $GITHUB_OUTPUT
        else
          echo "tags=k8s-python-leader-election:pr-build" >> $GITHUB_OUTPUT
        fi

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' }}
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
